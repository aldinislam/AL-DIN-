name: Build iOS IPA Only
on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Directory (www)
        run: |
          mkdir -p www
          cp -r index.html css js assets img www/ 2>/dev/null || cp -r * www/ 2>/dev/null || true

      - name: Setup iOS Platform
        run: |
          npx cap add ios || echo "iOS already added"
          npx cap sync ios

      - name: Install CocoaPods Dependencies
        run: |
          cd ios/App
          pod install

      # 🚀 بناء التطبيق لمعالج الآيفون الحقيقي وبدون توقيع إجباري
      - name: Compile iOS App for Real Device
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath buildOutput \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      # 📦 تحويل ملف الـ App إلى صيغة IPA المقبولة في التثبيت
      - name: Package IPA
        run: |
          mkdir -p ios/App/buildOutput/Payload
          cp -r ios/App/buildOutput/Build/Products/Release-iphoneos/App.app ios/App/buildOutput/Payload/
          cd ios/App/buildOutput
          zip -r AL-DINE.ipa Payload

      # 📥 رفع ملف الـ IPA النهائي لتحميله على كمبيوترك الويندوز
      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AL-DINE-iOS-IPA
          path: ios/App/buildOutput/AL-DINE.ipa
