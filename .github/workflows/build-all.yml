name: Build APK and EXE
on:
  push:
    branches:
      - main

jobs:
  build-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Directory (www)
        run: |
          mkdir -p www
          cp -r index.html css js assets img www/ 2>/dev/null || cp -r * www/ 2>/dev/null || true

      - name: Build Android APK
        run: |
          npx cap add android || echo "Android already added"
          npx cap sync
          cd android
          ./gradlew assembleDebug

      - name: Build Windows EXE
        run: npx electron-builder --win

      - name: Upload Finished Packages
        uses: actions/upload-artifact@v4
        with:
          name: AL-DINE-Final-Apps
          path: |
            dist/*-Setup.exe
            android/app/build/outputs/apk/debug/app-debug.apk
